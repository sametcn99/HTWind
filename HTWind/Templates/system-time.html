<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Time</title>
  <style>
    :root {
      --text: #eef4ff;
      --muted: #adbed9;
      --line: rgba(178, 209, 255, 0.24);
      --bg: radial-gradient(circle at 20% 12%, rgba(105, 171, 255, 0.32), transparent 45%), linear-gradient(160deg, rgba(15, 23, 43, 0.95), rgba(6, 11, 23, 0.98));
    }
    html, body { width: 100%; height: 100%; margin: 0; font-family: "Bahnschrift", "Segoe UI", sans-serif; color: var(--text); background: transparent; }
    .card { width: 100%; height: 100%; box-sizing: border-box; padding: 14px; border-radius: 16px; border: 1px solid var(--line); background: var(--bg); display: grid; grid-template-rows: auto auto auto 1fr; gap: 8px; }
    .label { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .time { font-size: clamp(1.8rem, 6vw, 2.4rem); font-weight: 700; }
    .meta { font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">System Time</div>
    <div id="local" class="time">--:--:--</div>
    <div id="utc" class="meta">UTC: --</div>
    <div id="zone" class="meta">Zone: --</div>
  </div>
  <script>
    function pick(obj, camel, pascal) { return obj?.[camel] ?? obj?.[pascal]; }

    async function execPs(script) {
      const result = await window.HTWind.invoke("powershell.exec", { script });
      const timedOut = !!(result?.timedOut ?? result?.TimedOut);
      const exitCode = result?.exitCode ?? result?.ExitCode;
      const stdout = String(result?.output ?? result?.Output ?? "");
      const stderr = String(result?.error ?? result?.Error ?? "");
      if (timedOut) throw new Error("PowerShell command timed out.");
      if (typeof exitCode === "number" && exitCode !== 0) {
        throw new Error(stderr || stdout || `PowerShell failed with exit code ${exitCode}.`);
      }

      return stdout;
    }

    async function execPsJson(script) {
      const wrapped = `$ProgressPreference='SilentlyContinue'; $ErrorActionPreference='Stop'; $__result = & { ${script} }; if ($null -eq $__result) { '{}' } else { $__result | ConvertTo-Json -Depth 24 -Compress }`;
      const output = await execPs(wrapped);
      return output.trim() ? JSON.parse(output) : {};
    }

    async function refresh() {
      try {
        const t = await execPsJson("$now = Get-Date; [pscustomobject]@{ LocalIso = $now.ToString('o'); UtcIso = $now.ToUniversalTime().ToString('o'); TimeZone = [System.TimeZoneInfo]::Local.DisplayName }");
        const localIso = pick(t, "localIso", "LocalIso");
        const utcIso = pick(t, "utcIso", "UtcIso");
        const zone = pick(t, "timeZone", "TimeZone") || "Unknown";
        const local = localIso ? new Date(localIso) : new Date();
        document.getElementById("local").textContent = local.toLocaleTimeString();
        document.getElementById("utc").textContent = `UTC: ${utcIso || "-"}`;
        document.getElementById("zone").textContent = `Zone: ${zone}`;
      } catch {
        document.getElementById("local").textContent = "Error";
      }
    }
    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
