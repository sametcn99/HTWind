<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Controls</title>
  <style>
    :root { --text:#eef4ff; --muted:#a8bad5; --line:rgba(181,212,255,.24); --bg:radial-gradient(circle at 84% 16%, rgba(95,172,255,.33), transparent 44%), linear-gradient(160deg, rgba(15,24,43,.95), rgba(6,11,23,.98)); }
    html, body { width:100%; height:100%; margin:0; font-family:"Bahnschrift","Segoe UI",sans-serif; color:var(--text); background:transparent; }
    .card { width:100%; height:100%; box-sizing:border-box; padding:12px; border-radius:16px; border:1px solid var(--line); background:var(--bg); display:grid; grid-template-rows:auto auto auto 1fr auto; gap:8px; }
    .label { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
    .title { font-size:1rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .artist { font-size:.86rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .controls { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    button { border:1px solid var(--line); border-radius:10px; background:rgba(255,255,255,.08); color:var(--text); padding:9px 10px; font:inherit; cursor:pointer; }
    .primary { border:none; background:linear-gradient(135deg,#75c0ff,#4fa8ff); color:#041423; font-weight:700; }
    .meta { font-size:.8rem; color:var(--muted); min-height:1.1em; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Media Controls</div>
    <div id="title" class="title">No media session</div>
    <div id="artist" class="artist">-</div>
    <div class="controls">
      <button onclick="previousTrack()">Previous</button>
      <button class="primary" onclick="playPause()">Play/Pause</button>
      <button onclick="nextTrack()">Next</button>
    </div>
    <div id="meta" class="meta">Ready.</div>
  </div>
  <script>
    function pick(obj, camel, pascal) { return obj?.[camel] ?? obj?.[pascal]; }
    async function runPs(script, parseJson = false) {
      const executableScript = parseJson
        ? `$ProgressPreference='SilentlyContinue'; $ErrorActionPreference='Stop'; $__result = & { ${script} }; if ($null -eq $__result) { '{}' } else { $__result | ConvertTo-Json -Depth 24 -Compress }`
        : script;

      const result = await window.HTWind.invoke("powershell.exec", { script: executableScript });
      const timedOut = !!(result?.timedOut ?? result?.TimedOut);
      const exitCode = result?.exitCode ?? result?.ExitCode;
      const stdout = String(result?.output ?? result?.Output ?? "");
      const stderr = String(result?.error ?? result?.Error ?? "");
      if (timedOut) throw new Error("PowerShell command timed out.");
      if (typeof exitCode === "number" && exitCode !== 0) {
        throw new Error(stderr || stdout || `PowerShell failed with exit code ${exitCode}.`);
      }

      if (!parseJson) return result;
      if (!stdout.trim()) return {};
      return JSON.parse(stdout);
    }
    const titleEl = document.getElementById("title");
    const artistEl = document.getElementById("artist");
    const metaEl = document.getElementById("meta");

    function setMeta(text) { metaEl.textContent = text; }

    async function refreshNowPlaying() {
      try {
        const media = await runPs("$p = Get-Process | Where-Object { $_.MainWindowTitle } | Select-Object -First 1; if ($null -eq $p) { $null } else { $parts = $p.MainWindowTitle -split ' - ', 2; [pscustomobject]@{ Title = if ($parts.Count -gt 0) { $parts[0] } else { $p.MainWindowTitle }; Artist = if ($parts.Count -gt 1) { $parts[1] } else { $p.ProcessName }; SourceAppUserModelId = $p.ProcessName } }", true);
        if (!media) {
          titleEl.textContent = "No media session";
          artistEl.textContent = "-";
          return;
        }

        titleEl.textContent = pick(media, "title", "Title") || "Unknown track";
        artistEl.textContent = pick(media, "artist", "Artist") || pick(media, "sourceAppUserModelId", "SourceAppUserModelId") || "Unknown source";
      } catch {
        titleEl.textContent = "Media API error";
      }
    }

    async function playPause() {
      setMeta("Toggling playback...");
      try {
        const r = await runPs("$w = New-Object -ComObject WScript.Shell; $w.SendKeys([char]179); [pscustomobject]@{ Succeeded = $true }", true);
        const ok = pick(r, "succeeded", "Succeeded");
        setMeta(ok ? "Playback toggled." : "Play/Pause command rejected.");
        refreshNowPlaying();
      } catch (error) {
        setMeta(`Error: ${error.message}`);
      }
    }

    async function nextTrack() {
      setMeta("Skipping next...");
      try {
        const r = await runPs("$w = New-Object -ComObject WScript.Shell; $w.SendKeys([char]176); [pscustomobject]@{ Succeeded = $true }", true);
        const ok = pick(r, "succeeded", "Succeeded");
        setMeta(ok ? "Next track." : "Next not supported.");
        refreshNowPlaying();
      } catch (error) {
        setMeta(`Error: ${error.message}`);
      }
    }

    async function previousTrack() {
      setMeta("Going previous...");
      try {
        const r = await runPs("$w = New-Object -ComObject WScript.Shell; $w.SendKeys([char]177); [pscustomobject]@{ Succeeded = $true }", true);
        const ok = pick(r, "succeeded", "Succeeded");
        setMeta(ok ? "Previous track." : "Previous not supported.");
        refreshNowPlaying();
      } catch (error) {
        setMeta(`Error: ${error.message}`);
      }
    }

    refreshNowPlaying();
    setInterval(refreshNowPlaying, 2000);
  </script>
</body>
</html>
