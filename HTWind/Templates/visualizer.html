<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizer</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; font-family: Segoe UI, sans-serif; color: #f5f7fb; background: transparent; }
    .card { width: 100%; height: 100%; box-sizing: border-box; padding: 12px; background: rgba(20,24,30,0.5); border: 1px solid rgba(255,255,255,0.15); display: grid; grid-template-rows: auto auto auto 1fr; gap: 8px; }
    .title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .artist { opacity: 0.85; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { opacity: 0.75; font-size: 0.82rem; }
    .bars { display: grid; grid-template-columns: repeat(16, 1fr); align-items: end; gap: 4px; }
    .bar { background: #67b6ff; border-radius: 4px 4px 0 0; min-height: 8px; transition: height 0.18s linear; }
  </style>
</head>
<body>
  <div class="card">
    <div id="title" class="title">No media session</div>
    <div id="artist" class="artist">-</div>
    <div id="meta" class="meta">Waiting for playback...</div>
    <div id="bars" class="bars"></div>
  </div>
  <script>
    function pick(obj, camelKey, pascalKey) {
      return obj?.[camelKey] ?? obj?.[pascalKey];
    }

    function toSeconds(value) {
      const n = Number(value);
      return Number.isFinite(n) && n >= 0 ? n : 0;
    }

    const barsHost = document.getElementById("bars");
    const titleEl = document.getElementById("title");
    const artistEl = document.getElementById("artist");
    const metaEl = document.getElementById("meta");
    const bars = [];
    let smoothedPeak = 0;

    for (let i = 0; i < 16; i++) {
      const el = document.createElement("div");
      el.className = "bar";
      barsHost.appendChild(el);
      bars.push(el);
    }

    function setIdleBars() {
      bars.forEach((bar, i) => {
        bar.style.height = `${8 + ((i % 4) * 2)}px`;
      });
    }

    function setAudioReactiveBars(progress01, peakLevel, motionPhase, isPlaying) {
      const clampedProgress = Math.max(0, Math.min(1, progress01));
      const activeBars = Math.round(clampedProgress * bars.length);
      const clampedPeak = Math.max(0, Math.min(1, peakLevel));
      const energy = isPlaying ? clampedPeak : 0;

      bars.forEach((bar, i) => {
        const isActive = i < activeBars;
        const profile = 0.55 + (Math.sin((i * 0.55) + motionPhase) + 1) * 0.225;
        const dynamicHeight = energy * 78 * profile;
        const base = isActive ? 18 : 10;
        const height = Math.max(8, base + dynamicHeight);
        bar.style.height = `${Math.round(height)}px`;
        bar.style.opacity = isActive ? `${0.65 + (energy * 0.35)}` : `${0.28 + (energy * 0.18)}`;
      });
    }

    function formatTime(seconds) {
      const total = Math.max(0, Math.floor(seconds));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    async function refresh() {
      try {
        const script = `
$knownPlayers = @('spotify','music','vlc','foobar2000','itunes','aimp','winamp')
$candidates = Get-Process | Where-Object {
  $_.MainWindowTitle -and (
    $knownPlayers -contains $_.ProcessName.ToLowerInvariant() -or
    $_.MainWindowTitle -match 'YouTube|Spotify|SoundCloud|Deezer|Apple Music|Tidal|Bandcamp'
  )
} | Sort-Object @{
  Expression = {
    if ($knownPlayers -contains $_.ProcessName.ToLowerInvariant()) { 0 }
    elseif ($_.MainWindowTitle -match 'YouTube|Spotify|SoundCloud|Deezer|Apple Music|Tidal|Bandcamp') { 1 }
    else { 2 }
  }
}, @{
  Expression = 'StartTime'
  Descending = $true
} | Select-Object -First 1

if ($null -eq $candidates) {
  $null
} else {
  $titleRaw = [string]$candidates.MainWindowTitle
  $title = $titleRaw
  $artist = ''

  if ($titleRaw -match '^(?<artist>.+?)\s+-\s+(?<title>.+)$') {
    $artist = $Matches.artist
    $title = $Matches.title
  }

  if ($title -match '^(?<title>.+?)\s+[-|]\s+YouTube') {
    $title = $Matches.title
  }

  if ([string]::IsNullOrWhiteSpace($artist)) {
    $artist = $candidates.ProcessName
  }

  $now = Get-Date
  $phase = (($now.Millisecond / 1000.0) + (($now.Second % 10) / 10.0))

  [pscustomobject]@{
    Media = [pscustomobject]@{
      Title = $title.Trim()
      Artist = $artist.Trim()
      PlaybackStatus = 'Playing'
      PositionSeconds = $now.Second
      EndTimeSeconds = 60
    }
    Audio = [pscustomobject]@{
      PeakLevel = [math]::Min(1.0, 0.2 + ($phase * 0.9))
      IsMuted = $false
    }
  }
}`;
        const data = await execPsJson(script);
        const media = pick(data, "media", "Media");
        const audio = pick(data, "audio", "Audio");

        if (!media) {
          titleEl.textContent = "No media session";
          artistEl.textContent = "-";
          metaEl.textContent = "Waiting for playback...";
          setIdleBars();
          return;
        }

        const title = pick(media, "title", "Title") || "Unknown track";
        const artist = pick(media, "artist", "Artist") || pick(media, "sourceAppUserModelId", "SourceAppUserModelId") || "Unknown source";
        const statusRaw = pick(media, "playbackStatus", "PlaybackStatus") || "Unknown";
        const positionSeconds = toSeconds(pick(media, "positionSeconds", "PositionSeconds"));
        const endTimeSeconds = toSeconds(pick(media, "endTimeSeconds", "EndTimeSeconds"));
        const isPlaying = String(statusRaw).toLowerCase() === "playing";
        const rawPeak = Number(pick(audio, "peakLevel", "PeakLevel") || 0);
        const peakLevel = Math.max(0, Math.min(1, rawPeak));
        const isMuted = !!pick(audio, "isMuted", "IsMuted");

        smoothedPeak = (smoothedPeak * 0.7) + (peakLevel * 0.3);

        titleEl.textContent = title;
        artistEl.textContent = artist;

        if (endTimeSeconds > 0) {
          const progress = positionSeconds / endTimeSeconds;
          setAudioReactiveBars(progress, smoothedPeak, Date.now() / 180, isPlaying && !isMuted);
          metaEl.textContent = `${statusRaw}${isMuted ? " (Muted)" : ""} • ${formatTime(positionSeconds)} / ${formatTime(endTimeSeconds)} • Level ${Math.round(smoothedPeak * 100)}%`;
        } else {
          setAudioReactiveBars(0, smoothedPeak, Date.now() / 180, isPlaying && !isMuted);
          metaEl.textContent = `${statusRaw}${isMuted ? " (Muted)" : ""} • Level ${Math.round(smoothedPeak * 100)}%`;
        }
      } catch {
        titleEl.textContent = "Media API error";
        artistEl.textContent = "-";
        metaEl.textContent = "Unable to read media session";
        setIdleBars();
      }
    }

    setIdleBars();

    async function execPs(script) {
      const result = await window.HTWind.invoke("powershell.exec", { script });
      const timedOut = !!(result?.timedOut ?? result?.TimedOut);
      const exitCode = result?.exitCode ?? result?.ExitCode;
      const stdout = String(result?.output ?? result?.Output ?? "");
      const stderr = String(result?.error ?? result?.Error ?? "");
      if (timedOut) throw new Error("PowerShell command timed out.");
      if (typeof exitCode === "number" && exitCode !== 0) {
        throw new Error(stderr || stdout || `PowerShell failed with exit code ${exitCode}.`);
      }

      return stdout;
    }

    async function execPsJson(script) {
      const wrapped = `$ProgressPreference='SilentlyContinue'; $ErrorActionPreference='Stop'; $__result = & { ${script} }; if ($null -eq $__result) { '{}' } else { $__result | ConvertTo-Json -Depth 24 -Compress }`;
      const output = await execPs(wrapped);
      return output.trim() ? JSON.parse(output) : {};
    }

    refresh();
    setInterval(refresh, 220);
  </script>
</body>
</html>
